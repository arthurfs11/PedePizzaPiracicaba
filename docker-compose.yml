version: "3.8"

services:

  # ── n8n: Orquestrador de fluxos ──────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: pede-pizza-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASS:-pizza123}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - TZ=America/Sao_Paulo
    volumes:
      - n8n_data:/home/node/.n8n
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pizza-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Dashboard: Painel de pedidos ─────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: pede-pizza-dashboard
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - PORT=8000
      - DB_PATH=/data/pedidos.db
    volumes:
      - pizza_db:/data
    networks:
      - pizza-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/api/stats"]
      interval: 20s
      timeout: 5s
      retries: 3

  # ── Telegram Bot ─────────────────────────────────────────
  bot:
    build:
      context: ./telegram-bot
      dockerfile: Dockerfile
    container_name: pede-pizza-bot
    restart: unless-stopped
    env_file: .env
    environment:
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook/direciona-pedido
    depends_on:
      - n8n
      - dashboard
    networks:
      - pizza-net

volumes:
  n8n_data:
  pizza_db:

networks:
  pizza-net:
    driver: bridge
